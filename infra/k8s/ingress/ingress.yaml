apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aion-copilot-ingress
  namespace: aion-copilot
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: aion-copilot-ip
spec:
  rules:
    - http:
        paths:
          - path: /api/ai/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai-agent
                port:
                  number: 3001
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8080
