syntax = "proto3";

package chatapp.thread.v1;

option go_package = "github.com/AIon-C/AIon-Copilot/backend/gen/go/chatapp/thread/v1;threadv1";

import "chatapp/model/v1/message.proto";

message GetThreadRequest {
  string thread_root_id = 1;
}

message GetThreadResponse {
  chatapp.model.v1.Message root_message = 1;
  repeated chatapp.model.v1.Message replies = 2;
}

service ThreadService {
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
}
