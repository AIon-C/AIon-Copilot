syntax = "proto3";

package chatapp.channel.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/channel//v1;channelv1";

import "google/protobuf/field_mask.proto";
import "chatapp/common/v1/pagination.proto";
import "chatapp/common/v1/sort.proto";
import "chatapp/model/v1/channel.proto";
import "chatapp/model/v1/channel_member.proto";

message CreateChannelRequest {
  string workspace_id = 1;
  string name = 2;
  string decription = 3;
  string client_request_id = 4;
}

message CreateChannelResponse {
  chatapp.model.v1.Channel channel = 1;
}

message ListChannelsRequest {
  string workspace_id = 1;
  chatapp.common.v1.PageRequest page = 2;
  chatapp.common.v1.Sort sort = 3;
}

message ListChannelsResponse {
  repeated chatapp.model.v1.Channel channels = 1;
  chatapp.common.v1.PageResponse page = 2;
}

message SearchChannelsRequest {
  string workspace_id = 1;
  string query = 2;
  chatapp.common.v1.PageRequest page = 3;
}

message SearchChannelsResponse {
  repeated chatapp.model.v1.Channel channels = 1;
  chatapp.common.v1.PageResponse page = 2;
}

message GetChannelRequest {
  string channel_id = 1;
}

message GetChannelResponse {
  chatapp.model.v1.Channel channel = 1;
}

message UpdateChannelRequest {
  chatapp.model.v1.Channel channel = 1;
  goole.protobuf.FieldMask update_mask = 2;
}

message UpdateChannelResponse {
  chatapp.model.v1.Channel channel = 1;
}

message JoinChannelRequest {
  string channel_id = 1;
  string client_request_id = 2;
}

message JoinChannelResponse {
  chatapp.model.v1.ChannelMember membership = 1;
}

message  LeaveChannelRequest {
  string channel_id = 1;
}

message  LeaveChannelResponse {}

message MarkChannelReadRequest {
  string channel_id = 1;
  string last_read_mnessage_id = 2;
}

message MarkChannelReadResponse {}

service ChannelService {
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc SearchChannels(SearchChannelsRequest) returns (SearchChannelsResponse);
  rpc GetChannel(GetChannelRequest) returns (GetChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc JoinChannel(JoinChannelRequest) returns (JoinChannelResponse);
  rpc LeaveChannel(LeaveChannelRequest) returns (LeaveChannelResponse);
  rpc MarkChannelRead(MarkChannelReadRequest) returns (MarkChannelReadResponse);
}