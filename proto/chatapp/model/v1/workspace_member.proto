syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "google/protobuf/timestamp.proto";

message WorkspaceMember {
  string id = 1;
  string workspace_id = 2;
  string user_id = 3;
  google.protobuf.Timestamp joined_at = 4;
}