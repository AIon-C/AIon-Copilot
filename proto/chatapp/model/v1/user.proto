syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-C/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "chatapp/common/v1/metadata.proto";

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string avatar_url = 4;
  chatapp.common.v1.AuditMetadata metadata = 5;
}