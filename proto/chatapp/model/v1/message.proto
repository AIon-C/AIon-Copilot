syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "google/protobuf/timestamp.proto";

message Message {
  string id = 1;
  string channel_id = 2;
  string user_id = 3;
  string thread_root_id = 4;
  string content = 5;
  bool is_edited = 6;
  google.protobuf.Timestamp edited_at = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp deleted_at = 9;
}