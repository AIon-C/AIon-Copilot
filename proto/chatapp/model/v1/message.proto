syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "chatapp/common/v1/metadata.proto";

message Message {
  string id = 1;
  string channel_id = 2;
  string user_id = 3;
  optional string thread_root_id = 4;
  string content = 5;
  bool is_edited = 6;
  chatapp.common.v1.AuditMetadata metadata = 7;
}