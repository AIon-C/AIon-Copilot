syntax = "proto3";

package chatapp.model.v1;

option go_package = "github.com/AIon-C/AIon-Copilot/backend/gen/go/chatapp/model/v1;modelv1";

import "google/protobuf/timestamp.proto";

message Reaction {
  string id = 1;
  string message_id = 2;
  string user_id = 3;
  string emoji_code = 4;
  google.protobuf.Timestamp created_at = 5;
}