syntax = "proto3";

package chatapp.auth.v1;

option go_package = "github.com/AIon-Copilot/backend/gen/go/chatapp/auth/v1;authv1";

import "google/protobuf/timestamp.proto";
import "chatapp/model/v1/user.proto";

message SignUpRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
  
  string client_request_id = 4;
}

message SignUpResponse {
  chatapp.model.v1.User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message LogInRequest {
  string email = 1;
  string password = 2;
}

message LogInResponse {
  chatapp.model.v1.User user = 1;
  string access_token = 2;
  string refresh_token = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message LogoutRequest {}

message LogoutResponse {}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message SendPasswordResetEmailRequest {
  string email = 1;
}

message SendPasswordResetEmailResponse {}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {}

service AuthService {
  rpc SignUp(SignUpRequest) returns (SignUpResponse);
  rpc LogIn(LogInRequest) returns (LogInResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc SendPasswordResetEmail(SendPasswordResetEmailRequest) returns (SendPasswordResetEmailResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
}