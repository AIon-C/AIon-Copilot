apiVersion: v1
kind: Secret
metadata:
  name: ai-agent-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:postgres@host.docker.internal:5432/chatapp?sslmode=disable"
  JWT_SECRET: "your-jwt-secret-key-change-in-production"
  GOOGLE_GENERATIVE_AI_API_KEY: "REPLACE_WITH_YOUR_API_KEY"
