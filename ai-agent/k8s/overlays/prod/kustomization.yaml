apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replicas:
  - name: ai-agent
    count: 2

images:
  - name: ai-agent
    newName: asia-northeast1-docker.pkg.dev/aion-copilot/aion-copilot/ai-agent

patches:
  - target:
      kind: Deployment
      name: ai-agent
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ai-agent
      spec:
        template:
          spec:
            serviceAccountName: ai-agent
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
            containers:
              - name: ai-agent
                imagePullPolicy: IfNotPresent
  - target:
      kind: ConfigMap
      name: ai-agent-config
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ai-agent-config
      data:
        NODE_ENV: "production"
        REDIS_URL: "redis://redis:6379"
        GCP_PROJECT_ID: "aion-copilot-prod"
        GCP_LOCATION: "asia-northeast1"
  - target:
      kind: Secret
      name: ai-agent-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: ai-agent-secret
      stringData:
        DATABASE_URL: "postgres://chatapp:uy0RRp4YPWfR829y%2FohCHYIV1tytrTOS@10.192.0.3:5432/chatapp"
        JWT_SECRET: "kWgVSLL15WnDy1BvADBUxf84XD/umZ2vPfOeIOsClu8="
        GOOGLE_GENERATIVE_AI_API_KEY: "AIzaSyDCfPYe_qwryhfxN9nWNeYm94eab37CPAA"
