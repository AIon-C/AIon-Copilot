apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replicas:
  - name: backend
    count: 2

images:
  - name: backend
    newName: asia-northeast1-docker.pkg.dev/aion-copilot/aion-copilot/backend

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        template:
          spec:
            serviceAccountName: backend
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
            containers:
              - name: backend
                imagePullPolicy: IfNotPresent
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: backend-config
      data:
        GCS_ENDPOINT: ""
        GCS_PUBLIC_URL: ""
        REDIS_URL: "redis://redis:6379"
  - target:
      kind: Secret
      name: backend-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: backend-secret
      stringData:
        DATABASE_URL: "postgres://chatapp:uy0RRp4YPWfR829y%2FohCHYIV1tytrTOS@10.192.0.3:5432/chatapp"
        JWT_SECRET: "kWgVSLL15WnDy1BvADBUxf84XD/umZ2vPfOeIOsClu8="
