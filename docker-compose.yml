services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # fake-gcs-server — local GCS emulator (GKE: Cloud Storage)
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    command:
      - "-scheme=http"
      - "-port=4443"
      - "-external-url=http://localhost:4443"
    volumes:
      - gcs-data:/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/chatapp?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GCS_BUCKET: chatapp-files
      GCS_ENDPOINT: http://fake-gcs:4443
      GCS_PUBLIC_URL: http://localhost:4443
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_started

  # gRPC UI — Swagger-like API tester for gRPC/Connect services
  # Access at http://localhost:8090
  grpcui:
    image: fullstorydev/grpcui:latest
    ports:
      - "8090:8080"
    command:
      - "-plaintext"
      - "-bind=0.0.0.0"
      - "-port=8080"
      - "backend:8080"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # Prometheus — metrics collection (GKE: managed Prometheus)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_started

  # Grafana — monitoring dashboard (GKE: Grafana in cluster)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    depends_on:
      prometheus:
        condition: service_started

  agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    command: ["npx", "tsx", "watch", "src/index.ts"]
    ports:
      - "3001:3001"
    volumes:
      - ./ai-agent:/app
      - node_modules_agent:/app/node_modules
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/chatapp?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GO_BACKEND_URL: http://backend:8080
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_AI_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  redis-data:
  gcs-data:
  prometheus-data:
  grafana-data:
  node_modules_frontend:
  node_modules_agent:
